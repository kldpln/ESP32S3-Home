<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <!--设置显示比例自适应-->
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <!--设置网页标题-->
        <title>温湿度监控系统</title>
        <!-- 阻止浏览器自动去请求 favicon.ico 网站图标 -->
        <link rel="icon" href="data:,">
        <style>
            /* 全局样式重置 */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html {
                background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
                min-height: 100%;
            }

            body {
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                color: rgb(255, 255, 255);
                padding: 20px; /* 移动端减小边距 */
            }

            .container {
                text-align: center;
                background: rgba(0, 0, 0, 0.3); /* 加深一点背景让文字更清晰 */
                backdrop-filter: blur(15px);
                -webkit-backdrop-filter: blur(15px);
                padding: 20px;
                border-radius: 20px;
                box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
                width: 100%;
                max-width: 600px;
                /* 防止内容撑开容器 */
                overflow: hidden; 
            }
            /* 修复移动端padding过大问题 */
            @media (max-width: 480px) {
                .container {
                    padding: 15px; 
                }
            }
            
            .cards-wrapper {
                display: grid; /* 改用Grid布局 */
                grid-template-columns: 1fr 1fr; /* 两列等宽 */
                gap: 15px;
                margin-bottom: 20px;
            }
            
            /* 手机竖屏时，如果宽度太小，卡片自动单列显示(可选，目前两列通常也没问题) */
            @media (max-width: 350px) {
                .cards-wrapper {
                    grid-template-columns: 1fr;
                }
            }

            .card {
                background: rgba(255, 255, 255, 0.05); /* 统一为深色背景 */
                padding: 15px;
                border-radius: 12px;
                transition: transform 0.3s ease;
                /* 去掉边框以保持一致 */
            }

            h1 {
                font-size: 1.8rem;
                margin-bottom: 20px;
                font-weight: 700;
                text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            }

            h2 {
                font-size: 1rem;
                opacity: 0.9;
                margin-bottom: 5px;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            /* 优化数值显示：大数字，清晰 */
            .value-box {
                margin: 10px 0;
                display: flex;
                justify-content: center;
                align-items: baseline; /* 基线对齐，让单位沉底 */
            }
            
            .value-box .val-number {
                font-size: 2.5rem; /* 大字体 */
                font-weight: 700;
                line-height: 1;
                /* 加上一点阴影防背景干扰 */
                text-shadow: 0 2px 4px rgba(0,0,0,0.3); 
            }

            .value-box .val-unit {
                font-size: 1.2rem;
                margin-left: 4px;
                opacity: 0.8;
                font-weight: 500;
            }

            /* 图表容器优化 - 统一外观 */
            .chart-wrapper {
                background: rgba(255, 255, 255, 0.05);
                border-radius: 12px;
                padding: 10px;
                width: 100%;
                /* 关键：给图表容器一个固定高度（或者vh），防止被压扁 */
                height: 350px; 
                position: relative;
            }

            /* 历史数据区块 - 平铺式仪表盘布局 */
            .history-section {
                margin-top: 30px;
                width: 100%;
                border-top: 1px solid rgba(255,255,255,0.1);
                padding-top: 20px;
                text-align: left;
            }
            
            .section-title {
                font-size: 1.2rem;
                margin-bottom: 15px;
                font-weight: 600;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .history-grid {
                display: grid;
                grid-template-columns: 1fr; /* 默认单列 (移动端) */
                gap: 15px;
            }

            /* 分区内的小卡片 */
            .history-card {
                background: rgba(255,255,255,0.05); /* 比主卡片深一点 */
                border-radius: 12px;
                padding: 15px;
                /* 关键修复：防止Grid子项被内容撑大导致溢出 */
                min-width: 0;
                overflow: hidden; /* 确保内容不会溢出圆角 */
            }

            .history-columns-wrapper {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .history-item {
                display: flex;
                flex-direction: column;
                margin-bottom: 8px;
            }
            .label { font-size: 0.8rem; color: #ccc; }
            .val   { font-size: 1.1rem; font-weight: bold; }
            
            .text-red { color: #ff6384; }
            .text-blue { color: #36a2eb; }

            /* 新增：弹窗模态框样式 */
            .modal-overlay {
                display: none; /* 默认隐藏 */
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0, 0, 0, 0.6);
                backdrop-filter: blur(5px);
                -webkit-backdrop-filter: blur(5px);
                z-index: 1000;
                justify-content: center;
                align-items: center;
                opacity: 0;
                transition: opacity 0.3s ease;
            }

            .modal-overlay.show {
                display: flex;
                opacity: 1;
            }

            .modal-content {
                background: rgba(30, 45, 80, 0.95);
                padding: 30px;
                border-radius: 16px;
                width: 90%;
                max-width: 400px;
                position: relative;
                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                transform: translateY(-20px);
                transition: transform 0.3s ease;
                border: 1px solid rgba(255,255,255,0.1);
            }

            .modal-overlay.show .modal-content {
                transform: translateY(0);
            }

            .close-btn {
                position: absolute;
                top: 15px;
                right: 20px;
                font-size: 1.5rem;
                cursor: pointer;
                opacity: 0.7;
                transition: opacity 0.2s;
            }

            .close-btn:hover { opacity: 1; }

            .input-group {
                margin-bottom: 20px;
                text-align: left;
            }

            .input-group label {
                display: block;
                margin-bottom: 8px;
                font-size: 0.9rem;
                color: #ccc;
            }

            .input-group input {
                width: 100%;
                padding: 12px;
                border-radius: 8px;
                border: 1px solid rgba(255,255,255,0.2);
                background: rgba(0,0,0,0.2);
                color: white;
                font-size: 1rem;
                outline: none;
                transition: border-color 0.2s;
            }

            .input-group input:focus {
                border-color: #36a2eb;
            }

            .submit-btn {
                width: 100%;
                padding: 12px;
                background: linear-gradient(135deg, #36a2eb 0%, #1e3c72 100%);
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 1.1rem;
                font-weight: bold;
                cursor: pointer;
                transition: box-shadow 0.2s;
            }

            .submit-btn:hover {
                box-shadow: 0 4px 15px rgba(54, 162, 235, 0.4);
            }

            .settings-btn {
                background: none;
                border: none;
                color: white;
                cursor: pointer;
                opacity: 0.7;
                transition: opacity 0.2s, transform 0.2s;
                padding: 5px;
            }

            .settings-btn:hover {
                opacity: 1;
                transform: scale(1.1) rotate(15deg);
            }

            .status-msg {
                margin-top: 15px;
                font-size: 0.9rem;
                text-align: center;
                display: none;
            }

            /* 响应式适配：宽屏设备 (>= 768px) 改为横向分栏 */
            @media (min-width: 768px) {
                .container {
                    max-width: 900px; /* 放宽容器限制 */
                }
                .history-grid {
                    grid-template-columns: 1fr 1fr; /* 两列布局 */
                    /* 今日与昨日在第一排, 趋势图在旁边或者下面?
                       方案: 左边两块(今日+昨日) 堆叠, 右边放图表 */
                    grid-template-areas: 
                        "today chart"
                        "yest chart";
                }
                /* 如果希望今日昨日并排，图表在下，不需要特殊 grid-area */
                .history-grid {
                   grid-template-columns: 1fr 1fr; /* 今日 | 昨日 */
                }
                /* 专门给图表留一个跨两列的位置 */
                .history-chart-full {
                    grid-column: span 2;
                }
            }
        </style>
    </head>
    <body>
        <!-- 新增：Wi-Fi配网弹窗模态框 -->
        <div id="wifiModal" class="modal-overlay">
            <div class="modal-content">
                <span class="close-btn" onclick="closeWifiModal()">&times;</span>
                <h3>连接到新网络</h3>
                <p style="margin-bottom: 15px; font-size: 0.9rem; color: #ddd;">请输入要连接的 Wi-Fi 名称和密码</p>
                <form id="wifiForm" onsubmit="submitWifi(event)">
                    <div class="input-group">
                        <label for="ssid">Wi-Fi 名称 (SSID)</label>
                        <input type="text" id="ssid" required placeholder="请输入路由器的名称">
                    </div>
                    <div class="input-group">
                        <label for="password">Wi-Fi 密码</label>
                        <input type="password" id="password" required placeholder="请输入密码">
                    </div>
                    <button type="submit" class="submit-btn" id="wifiSubmitBtn">连接</button>
                    <p id="wifiStatus" class="status-msg"></p>
                </form>
            </div>
        </div>

        <div class="container">
            <!-- 头部区域采用 Flex 布局，让标题和设置按钮在一行 -->
            <div class="header-area" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 style="margin-bottom: 0;">Legadema Home</h1>
                <button class="settings-btn" onclick="openWifiModal()" title="网络设置">
                    <!-- 这里可以使用一个简单的齿轮或 Wi-Fi 图标 SVG -->
                    <svg t="1683900000000" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor">
                        <path d="M738.133333 392.533333a286.72 286.72 0 0 1 143.786667 36.693334 34.133333 34.133333 0 0 1-35.84 58.026666 218.453333 218.453333 0 0 0-215.893333 1.28 34.133333 34.133333 0 0 1-35.84-58.453333 286.72 286.72 0 0 1 143.786666-37.546667zM512 618.666667A106.666667 106.666667 0 1 1 512 832a106.666667 106.666667 0 0 1 0-213.333334z m338.346667-422.4a494.506667 494.506667 0 0 1 202.666666 43.52 34.133333 34.133333 0 1 1-26.026666 63.146666 426.24 426.24 0 0 0-464.213334 5.546667 34.133333 34.133333 0 0 1-37.546666-56.32 494.933333 494.933333 0 0 1 325.12-55.893333z" p-id="1234"></path>
                    </svg>
                </button>
            </div>

            <div class="cards-wrapper">
                <!-- 温度卡片 -->
                 <div class="card">
                    <h2>温度</h2>
                    <div class="value-box">
                        <span id="temp-val" class="val-number">--</span>
                        <span id="unit" class="val-unit">°C</span>
                    </div>
                 </div>
                <!-- 湿度卡片 -->
                <div class="card">
                    <h2>湿度</h2>
                    <div class="value-box">
                        <span id="hum-val" class="val-number">--</span>
                        <span id="unit" class="val-unit">%</span>
                    </div>
                </div>
            </div>

            <!--图表显示区域 独立且固定高度-->
             <div class="chart-wrapper">
                <canvas id="tempChart"></canvas>
             </div>

              <!-- 新增：优雅的独立报警配置卡片 (位于图表下方) -->
              <div class="card" style="margin-top: 20px; margin-bottom: 25px; padding: 15px 20px; display: flex; flex-direction: column; gap: 18px;">
                  <div style="display: flex; align-items: center; gap: 12px;">
                      <div style="font-size: 1.8rem; background: rgba(255, 94, 91, 0.15); width: 44px; height: 44px; border-radius: 12px; display: flex; justify-content: center; align-items: center;">
                          🚨
                      </div>
                      <div>
                          <h3 style="margin: 0; font-size: 1.05rem; font-weight: 600;">高温报警自动干预</h3>
                          <p style="margin: 3px 0 0 0; font-size: 0.8rem; color: rgba(255,255,255,0.5);">当系统温度超过设定阈值时起效</p>
                      </div>
                  </div>
                  
                  <div style="display: flex; align-items: center; justify-content: center; margin: 0 auto; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 4px 6px;">
                      <button onclick="document.getElementById('alarmThresholdInput').stepDown()" style="background: transparent; color: #fff; border: none; font-size: 1.2rem; cursor: pointer; padding: 0 10px; opacity: 0.7;">-</button>
                      <input type="number" id="alarmThresholdInput" value="30.0" step="0.5" style="width: 48px; background: transparent; border: none; color: #fff; font-size: 1.05rem; font-weight: bold; text-align: center; outline: none; appearance: textfield; -moz-appearance: textfield;">
                      <span style="color: #fff; font-size: 0.9rem; margin-right: 8px; opacity: 0.7;">℃</span>
                      <button onclick="document.getElementById('alarmThresholdInput').stepUp()" style="background: transparent; color: #fff; border: none; font-size: 1.2rem; cursor: pointer; padding: 0 10px; opacity: 0.7;">+</button>
                      <button onclick="saveAlarmThreshold()" style="background: #FF5E5B; color: #fff; border: none; border-radius: 16px; padding: 6px 14px; font-weight: 600; font-size: 0.85rem; cursor: pointer; margin-left: 5px; box-shadow: 0 2px 6px rgba(255,94,91,0.3);">保存</button>
                  </div>
              </div>

             <!-- 历史数据面板 (无需跳转，向下扩展) -->
             <div class="history-section">
                <div class="section-title">历史概况</div>
                
                <div class="history-grid">
                    <!-- 今日统计 -->
                    <div class="history-card">
                        <h3>今日极值</h3>
                        <div class="history-columns-wrapper" style="margin-top:10px;">
                            <div class="history-item">
                                <span class="label">最高温度</span>
                                <span class="val text-red" id="today-max-temp">--</span>
                            </div>
                            <div class="history-item">
                                <span class="label">最低温度</span>
                                <span class="val text-red" id="today-min-temp">--</span>
                            </div>
                            <div class="history-item">
                                <span class="label">最高湿度</span>
                                <span class="val text-blue" id="today-max-hum">--</span>
                            </div>
                            <div class="history-item">
                                <span class="label">最低湿度</span>
                                <span class="val text-blue" id="today-min-hum">--</span>
                            </div>
                        </div>
                    </div>

                    <!-- 昨日统计 (模拟展示) -->
                    <div class="history-card">
                         <h3>昨日回顾</h3>
                         <div class="history-columns-wrapper" style="margin-top:10px;">
                            <div class="history-item">
                                <span class="label">最高温度</span>
                                <span class="val text-red" id="yesterday-max-temp">--</span>
                            </div>
                            <div class="history-item">
                                <span class="label">最低温度</span>
                                <span class="val text-red" id="yesterday-min-temp">--</span>
                            </div>
                            <div class="history-item">
                                <span class="label">最高湿度</span>
                                <span class="val text-blue" id="yesterday-max-hum">--</span>
                            </div>
                            <div class="history-item">
                                <span class="label">最低湿度</span>
                                <span class="val text-blue" id="yesterday-min-hum">--</span>
                            </div>
                         </div>
                    </div>

                    <!-- 一周趋势图 -->
                    <div class="history-card history-chart-full">
                        <h3>本周趋势</h3>
                        <div style="height: 200px; position: relative;">
                            <canvas id="weeklyChart"></canvas>
                        </div>
                    </div>
                </div>
             </div>
        </div>

        <!--图表库-->
        <script src="/chart.js"></script>

        <!-- 温湿度文字显示脚本模块-->
        <script>
            let pollingTimer = null; // 轮询保底定时器
            let ws = null; // 全局 WebSocket 对象

            // ======= 报警控制变量 ======= //
            let alarmThreshold = 30.0;
            let isAlarmActive = false; // 记录报警状态，防止一直接收轰炸通知
            let isFirstLoad = true;    // 标记是否第一次加载数据

            document.addEventListener("DOMContentLoaded", function () {
                const thresholdInput = document.getElementById("alarmThresholdInput");
                if(thresholdInput) {
                    thresholdInput.addEventListener("change", function(e) {
                        alarmThreshold = parseFloat(e.target.value) || 30.0;
                        isAlarmActive = false; // 修改阈值后重置状态
                    });
                }
            });

            // 保存报警阈值到后端的函数
            function saveAlarmThreshold() {
                const inputVal = document.getElementById("alarmThresholdInput").value;
                const newThreshold = parseFloat(inputVal);
                if (isNaN(newThreshold)) {
                    alert("请输入有效的温度数字！");
                    return;
                }
                
                // 更新前端本地变量
                alarmThreshold = newThreshold;
                isAlarmActive = false;
                
                // POST 请求发送给 ESP32 后端
                fetch('/set_alarm', {
                    method: 'POST',
                    cache: 'no-store',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ threshold: newThreshold })
                })
                .then(res => res.json())
                .then(resData => {
                    if (resData.status === "ok") {
                        if (window.AndroidBridge && window.AndroidBridge.triggerAlert) {
                            window.AndroidBridge.triggerAlert("设置成功", "报警阈值已保存为 " + newThreshold + "℃", "success");
                        } else {
                            alert("报警阈值已成功保存到设备！");
                        }
                    } else {
                         alert("保存失败，请稍后重试");
                    }
                })
                .catch(err => {
                    console.error('Save Alarm Error:', err);
                    alert("保存失败：网络连接异常");
                });
            }

            // === 初始化图表配置 ===
            const ctx = document.getElementById('tempChart').getContext('2d');
            const myChart = new Chart(ctx, {
                type: 'line', // 折线图
                data: {
                    labels: [], // X轴：时间
                    datasets: [
                        {
                            label: '温度 (°C)',
                            data: [],
                            borderColor: 'rgba(255, 99, 132, 1)', // 红色线条
                            backgroundColor: 'rgba(255, 99, 132, 0.2)', // 红色填充背景
                            tension: 0.4, // 平滑曲线
                            borderWidth: 2,
                            yAxisID: 'y' // 绑定到左侧Y轴
                        },
                        {
                            label: '湿度 (%)',
                            data: [],
                            borderColor: 'rgba(54, 162, 235, 1)', // 蓝色线条
                            backgroundColor: 'rgba(54, 162, 235, 0.2)',
                            tension: 0.4,
                            borderWidth: 2,
                            yAxisID: 'y1' // 绑定到右侧Y轴 (双轴显示更清晰)
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, // 关键：关闭默认比例，允许图表撑满自定义高度的容器
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    animation: {
                        duration: 1000, 
                        easing: 'easeOutQuart'
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: { display: true, text: '温度' },
                            min: 0, // 固定温度下限
                            max: 50 // 固定温度上限
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: { display: true, text: '湿度' },
                            min: 0, // 固定湿度下限
                            max: 100, // 固定湿度上限
                            grid: {
                                drawOnChartArea: false, // 右侧轴不画网格线，防乱
                            }
                        }
                    }
                }
            });

            // 把原来 fetchData 里更新 UI 的部分提取出来，给 WebSocket 和 HTTP 共同使用
            function updateUI(data) {
                // 如果后端传回了正确的保存阈值，且是初次加载页面，则将其更新到UI和本地变量中
                if (data.alarmThreshold && isFirstLoad) {
                    let serverThreshold = parseFloat(data.alarmThreshold);
                    if (!isNaN(serverThreshold)) {
                        alarmThreshold = serverThreshold;
                        document.getElementById("alarmThresholdInput").value = serverThreshold;
                    }
                    isFirstLoad = false; // 此后不再覆盖用户的临时界面输入
                }

                // ---更新卡片文字---
                document.getElementById("temp-val").innerText = data.temperature;
                document.getElementById("hum-val").innerText = data.humidity;

                // ====== 新增：温度过高报警 ======
                let currentTemp = parseFloat(data.temperature);
                if (!isNaN(currentTemp)) {
                    // 当当前温度超过设定阈值
                    if (currentTemp > alarmThreshold) {
                        // 确认之前是否已经弹出过警告
                        if (!isAlarmActive) {
                            isAlarmActive = true; // 锁定报警状态
                            if (window.AndroidBridge && window.AndroidBridge.triggerAlert) {
                                window.AndroidBridge.triggerAlert(
                                    "温度过高警告！", 
                                    "当前温度已达到 " + currentTemp + "℃，请注意！",
                                    "alert"
                                );
                            } else {
                                console.log("【浏览器模拟提醒】：温度过高！当前温度 " + currentTemp + "℃");
                            }
                        }
                    } else {
                        // 如果温度降下来了，解除报警锁定，以便下次还能正常通知
                        isAlarmActive = false;
                    }
                }

                // 更新昨日数据 (改为读取 history[0])
                if(document.getElementById("yesterday-max-temp")) {
                    if(data.history && data.history[0] && data.history[0] !== null) {
                        const yData = data.history[0];
                        document.getElementById("yesterday-max-temp").innerText = yData.max_temp.toFixed(1) + "°C";
                        document.getElementById("yesterday-min-temp").innerText = yData.min_temp.toFixed(1) + "°C";
                        document.getElementById("yesterday-max-hum").innerText = yData.max_hum.toFixed(1) + "%";
                        document.getElementById("yesterday-min-hum").innerText = yData.min_hum.toFixed(1) + "%";
                    } else {
                        document.getElementById("yesterday-max-temp").innerText = "--";
                        document.getElementById("yesterday-min-temp").innerText = "--";
                        document.getElementById("yesterday-max-hum").innerText = "--";
                        document.getElementById("yesterday-min-hum").innerText = "--";
                    }
                }
                
                // 更新今日数据 (字段名保持不变，直接赋值)
                if(document.getElementById("today-max-temp")) {
                    document.getElementById("today-max-temp").innerText = data.max_temp_today + "°C";
                    document.getElementById("today-min-temp").innerText = data.min_temp_today + "°C";
                    document.getElementById("today-max-hum").innerText = data.max_hum_today + "%";
                    document.getElementById("today-min-hum").innerText = data.min_hum_today + "%";
                }
        
                // 更新图表
                const now = new Date();
                const timeLabel = now.getHours() + ':' + now.getMinutes() + ':' + now.getSeconds();

                // 添加新时间点到X轴
                myChart.data.labels.push(timeLabel);
                
                // 先填入 0 或起始值，让点先“蹲在底部”
                myChart.data.datasets[0].data.push(0);
                myChart.data.datasets[1].data.push(0);

                  // 保持图表不至于太挤，只保留最近5个点
                  if (myChart.data.labels.length > 5) {
                    myChart.data.labels.shift(); // 删掉最旧的时间
                    myChart.data.datasets[0].data.shift(); // 删掉最旧的温度
                    myChart.data.datasets[1].data.shift(); // 删掉最旧的湿度
                }

                // 第一步更新：静默更新（无动画），这时点在底部
                myChart.update('none');

                // 修改为真实数据
                // 获取数组最后一个位置的索引
                const lastIndex = myChart.data.datasets[0].data.length - 1;
                myChart.data.datasets[0].data[lastIndex] = data.temperature;
                myChart.data.datasets[1].data[lastIndex] = data.humidity;

                // 第二步更新：默认更新（带动画），点会从底部“飘”上来
                myChart.update();

                // === 新增：更新历史柱状图 ===
                // 准备数据容器
                let tempLabels = [];
                let tempHighs = [];
                let tempLows = [];
                const weekdayMap = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];

                if (data.history) {
                    // 倒序遍历: 7天前 -> 昨天
                    for (let i = 6; i >= 0; i--) {
                        const dayData = data.history[i];
                        if (dayData && dayData !== null) {
                            tempLabels.push(weekdayMap[dayData.weekday]);
                            tempHighs.push(dayData.max_temp);
                            tempLows.push(dayData.min_temp);
                        } else {
                            tempLabels.push(""); // 无数据留空
                            tempHighs.push(0); 
                            tempLows.push(0);
                        }
                    }
                }
                // 如果 myWeeklyChart 已经初始化了，就更新它
                if (typeof myWeeklyChart !== 'undefined' && myWeeklyChart) {
                    myWeeklyChart.data.labels = tempLabels;
                    myWeeklyChart.data.datasets[0].data = tempHighs;
                    myWeeklyChart.data.datasets[1].data = tempLows;
                    myWeeklyChart.update();
                }
            }

            // === 传统 HTTP 数据获取 (轮询保底) ===
            function fetchData() {
                // 使用时间戳强制绕过所有缓存机制，防止累积过长的请求头
                fetch('/data?t=' + Date.now(), { cache: 'no-store' })
                    .then(response => response.json())
                    .then(data => {
                        updateUI(data); // 抛给公用函数更新界面
                    })
                    .catch(error => console.error('HTTP Fetch Error:', error));
            }

            // === 超级 WebSocket 实时引擎 (防幽灵连接增强版) ===
            let lastWsMessageTime = 0;
            let wsReconnectTimer = null;

            function initWebSocket() {
                console.log("尝试建立 WebSocket 实时连接...");
                
                // 强杀旧连接，防止跨网后 App 内存和套接字偷偷泄漏
                if (ws) {
                    ws.onclose = null;
                    ws.onerror = null;
                    ws.onmessage = null;
                    ws.onopen = null;
                    if (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING) {
                        ws.close();
                    }
                    ws = null;
                }

                const wsProtocol = window.location.protocol === "https:" ? "wss://" : "ws://";
                // 动态获取主机名以支持 IP 和 mDNS 访问
                ws = new WebSocket(wsProtocol + window.location.host + "/ws");
                lastWsMessageTime = Date.now();

                ws.onopen = function() {
                    console.log("✅ WebSocket 连接成功！开启无头压缩高效传输！");
                    // 连接成功后，关掉传统轮询，改用 WS 定时心跳请求数据（后端等待 "get"）
                    clearInterval(pollingTimer);
                    lastWsMessageTime = Date.now(); // 刚连上也重置下时间
                    
                    pollingTimer = setInterval(() => {
                        if(ws && ws.readyState === WebSocket.OPEN) {
                            ws.send("get"); 
                            
                            // 【核心防挂死】如果发了 get 但 5 秒没收到任何回复，说明底层 TCP 已经死于网络切换
                            if (Date.now() - lastWsMessageTime > 5000) {
                                console.warn("❌ WS 心跳超时，连接被幽灵挂起！立即自杀并触发重连机制...");
                                ws.close(); // 这将强行截断 Socket，释放服务器资源并触发 onclose
                            }
                        }
                    }, 2000);
                };

                ws.onmessage = function(event) {
                    lastWsMessageTime = Date.now(); // 每次收到合法数据，立刻续命
                    // 收到极其干净的 JSON 数据帧，直接丢给 updateUI 渲染
                    try {
                        const data = JSON.parse(event.data);
                        updateUI(data);
                    } catch (e) {
                         console.error("WS 数据解析失败", e);
                    }
                };

                ws.onclose = function() {
                     console.warn("⚠️ WebSocket 被断开！进入 HTTP 保底和自动恢复策略！");
                     // 防止重复重启降级，清空当前收发器
                     clearInterval(pollingTimer);
                     
                     // 1. 无缝保底，立刻先用基础 HTTP 获取数据
                     pollingTimer = setInterval(fetchData, 2000); 
                     
                     // 2. 调度并在后台尝试重新爬起更高质量的 WS 连接
                     clearTimeout(wsReconnectTimer);
                     wsReconnectTimer = setTimeout(initWebSocket, 8000);
                };
                
                ws.onerror = function(err) {
                    console.error("WS 错误: ", err);
                    // 发生错误必然引发 close，把收尾工作统一交给 onclose 处理
                };
            }

            // 监听网络环境突变 (移动端基站/Wi-Fi切换、切回前台等事件)，主动切断死连接
            window.addEventListener('online', () => { 
                console.log("检测到网络切换或恢复！立即重置通讯连接！");
                if(ws) ws.close(); 
            });
            window.addEventListener('pagehide', () => { if(ws) ws.close(); });
            window.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    // App重回前台如果发现 WS 断开或者超时，可以更积极地唤醒重连
                    if(ws && ws.readyState !== WebSocket.OPEN) initWebSocket();
                }
            });

            //时间同步函数
            function syncTime() {
                //获取浏览器时间并转换为秒
                const timestamp = Math.floor(Date.now() / 1000);
                console.log("正在同步时间:", timestamp);

                //发送POST请求到服务器的时间同步接口
                fetch('/sync_time', {
                    method: 'POST',
                    cache: 'no-store',
                    body: timestamp.toString() //将时间转换为字符串发送
                })
                .then(response => {
                    if (response.ok) {
                        console.log("时间同步成功");
                    } else {
                        console.error("时间同步失败");
                    }
                })
                .catch(error => console.error('同步请求出错:', error));
            }
            //页面加载完成后同步
            syncTime();
            
            //启动定时器及 WebSocket
            fetchData(); // 先发一次 HTTP 数据请求预热
            initWebSocket(); // 启动 WebSocket 取代定时器（若失败自动重走定时器轮询）

            // === 新增：Wi-Fi 配网弹窗逻辑 ===
            function openWifiModal() {
                const modal = document.getElementById("wifiModal");
                modal.style.display = "flex";
                // 触发重绘以实现过渡动画
                setTimeout(() => modal.classList.add("show"), 10);
                document.getElementById("wifiStatus").style.display = "none";
            }

            function closeWifiModal() {
                const modal = document.getElementById("wifiModal");
                modal.classList.remove("show");
                setTimeout(() => modal.style.display = "none", 300);
            }

            function submitWifi(event) {
                event.preventDefault(); // 阻止表单默认跳转
                
                const ssid = document.getElementById("ssid").value;
                const password = document.getElementById("password").value;
                const btn = document.getElementById("wifiSubmitBtn");
                const status = document.getElementById("wifiStatus");
                
                btn.innerText = "正在下发...";
                btn.disabled = true;
                btn.style.opacity = "0.7";
                
                fetch('/wifi_config', {
                    method: 'POST',
                    cache: 'no-store',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ssid: ssid, password: password })
                })
                .then(response => response.json()) // 修改：解析 JSON 响应
                .then(data => {
                    status.style.display = "block";
                    if (data.status === "ok") {
                        status.style.color = "#4ade80";
                        status.innerText = "连接成功！设备IP: " + data.ip;
                        // 这里可以让弹窗多停几秒让用户看到 IP
                        setTimeout(() => {
                            closeWifiModal();
                            btn.innerText = "连接";
                            btn.disabled = false;
                            btn.style.opacity = "1";
                            document.getElementById("wifiForm").reset();
                        }, 5000); // 改为5秒后关闭
                    } else if(data.status === "timeout") {
                        status.style.color = "#fbbf24";
                        status.innerText = "连接超时，可能密码错误或网络不佳";
                        btn.innerText = "重新连接";
                        btn.disabled = false;
                        btn.style.opacity = "1";
                    } else {
                        throw new Error('网络请求失败');
                    }
                })
                .catch(error => {
                    status.style.display = "block";
                    status.style.color = "#ef4444";
                    status.innerText = "下发失败，请重试";
                    btn.innerText = "连接";
                    btn.disabled = false;
                    btn.style.opacity = "1";
                });
            }

            // 点击模态框背景关闭弹窗
            document.getElementById("wifiModal").addEventListener("click", function(e) {
                if (e.target === this) closeWifiModal();
            });

            // === 初始化本周趋势图 (放在最后初始化) ===
            var myWeeklyChart; // 必须声明为全局变量，否则fetchData里访问不到
            const ctxWeekly = document.getElementById('weeklyChart').getContext('2d');
            myWeeklyChart = new Chart(ctxWeekly, {
                type: 'bar', 
                data: {
                    labels: [], // 等待 fetchData 填充
                    datasets: [{
                        label: '最高温',
                        data: [],
                        backgroundColor: 'rgba(255, 99, 132, 0.5)',
                        borderColor: 'rgba(255, 99, 132, 1)',
                        borderWidth: 1
                    },
                    {
                        label: '最低温',
                        data: [],
                        backgroundColor: 'rgba(54, 162, 235, 0.5)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } }, 
                    scales: { y: { beginAtZero: false } }
                }
            });
        </script>
    </body>
</html>
